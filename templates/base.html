<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ranomics Tools{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Geist+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body>

  <header class="navbar">
    <div class="navbar-inner">
      <div class="brand">
        <a href="https://www.ranomics.com" target="_blank" rel="noopener noreferrer" class="brand-logo-link">
          <img src="{{ url_for('static', filename='logo-ranomics.png') }}" alt="Ranomics" class="brand-logo-img">
        </a>
        <span class="brand-divider"></span>
        <a href="{{ url_for('index') }}" class="brand-tool-link">Tools</a>
      </div>
      <div class="navbar-right">
        {% if session.get('user_email') %}
          <a href="{{ url_for('account') }}" class="nav-link">{{ session.get('user_email') }}</a>
          <form method="POST" action="{{ url_for('logout') }}" style="margin:0;">
            <button type="submit" class="btn-logout">Sign out</button>
          </form>
        {% endif %}
      </div>
    </div>
  </header>

  <main>
    <div class="app-container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer>
    Ranomics &middot; AI protein design and yeast display CRO &middot;
    <a href="https://www.ranomics.com" target="_blank" rel="noopener noreferrer">ranomics.com</a>
  </footer>

</body>
</html>
