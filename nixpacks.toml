# nixpacks.toml — Railway/Render build configuration for the Ranomics
# tools hub.
#
# The hub itself has only pure-Python dependencies, but pinning the
# Python version and install command here guarantees identical builds
# across Render and Railway. Individual tools under tools/<name>/ may
# add native dependencies later; extend nixPkgs as needed when that
# happens.
#
# Reference: https://nixpacks.com/docs/config/file

[phases.setup]
nixPkgs = ["gcc"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "gunicorn app:app --workers 1 --bind 0.0.0.0:$PORT --timeout 120 --preload"
